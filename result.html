<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>올해의 운세</title>
  <style>
    :root {
      --bg: #f1de5b;
      --accent: #e13268;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--accent);
      font-family: "Arial Black", "Noto Sans KR", sans-serif;
    }

    .result {
      height: 90vh;
      width: 100%;
      padding: 0px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .fortune {
      margin: 0;
      max-width: 760px;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: -0.4px;
      word-break: keep-all;
    }

    .retry {
      margin-top: 0;
      border: 0;
      background: transparent;
      color: var(--accent);
      font-size: 30px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
      padding: 0;
    }

    .retry:active {
      transform: scale(0.99);
    }
  </style>
  <script src="js/fortunes.js" defer></script>
</head>
<body>
  <main class="result">
    <h1 class="title">올해의 운세</h1>
    <p class="fortune" id="fortune"></p>
    <button class="retry" id="retry" type="button">다시 하기!</button>
  </main>
</body>
</html>
